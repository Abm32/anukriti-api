name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout anukriti-api
        uses: actions/checkout@v4
        with:
          path: anukriti-api

      - name: Checkout anukriti-swarm (sibling for runtime imports)
        uses: actions/checkout@v4
        with:
          repository: AnukritiAi-hq/anukriti-swarm
          ref: main
          path: anukriti-swarm

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install anukriti-swarm requirements
        working-directory: anukriti-swarm
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install anukriti-api
        working-directory: anukriti-api
        run: pip install -e ".[dev]"

      - name: Run smoke tests
        working-directory: anukriti-api
        env:
          PYTHONPATH: ${{ github.workspace }}/anukriti-api:${{ github.workspace }}/anukriti-swarm
        run: pytest -q --no-header
